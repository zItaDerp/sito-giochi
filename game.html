<!DOCTYPE html>
<html lang="it">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Game</title>
</head>

<style>
body {
    margin: 0;
    font-family: "Inter", sans-serif;
    color: white;
    line-height: 1.6;

    background: linear-gradient(-45deg, #0f0f1a, #0a0a12, #001a1a, #0f0f1a);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;

    overflow-x: hidden;
}

/* animazione base */
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.bg-grid {
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,255,204,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,204,0.05) 1px, transparent 1px);

    background-size: 40px 40px;
    animation: gridMove 8s linear infinite;

    z-index: -1;
}

@keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
}

/* ===== CYBER BACKGROUND ===== */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:

    radial-gradient(
        circle at 15% 20%,
        rgba(0,255,204,0.10),
        transparent 25%
    ),

    radial-gradient(
        circle at 85% 30%,
        rgba(0,120,255,0.10),
        transparent 25%
    ),

    radial-gradient(
        circle at 50% 80%,
        rgba(123,44,255,0.10),
        transparent 30%
    );

    animation:cyberFloat 14s ease-in-out infinite;

    pointer-events:none;

    z-index:-2;
}

@keyframes cyberFloat{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-20px);
    }

    100%{
        transform:translateY(0px);
    }
}

body::after{

    content:"";

    position:fixed;

    inset:0;

    background-image:

    linear-gradient(
        rgba(255,255,255,0.025) 1px,
        transparent 1px
    ),

    linear-gradient(
        90deg,
        rgba(255,255,255,0.025) 1px,
        transparent 1px
    );

    background-size:40px 40px;

    pointer-events:none;

    z-index:-1;

    mask-image:
    radial-gradient(circle at center,
    black 30%,
    transparent 90%);
}

/* Titolo */
#title {
    text-align: center;
    font-size: 40px;
    margin-top: 20px;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
    font-weight: 800;
    letter-spacing: 2px;
}

h2{

    font-size:1.3rem;

    font-weight:800;

    letter-spacing:2px;

    text-shadow:
    0 0 12px rgba(0,255,204,0.25);
}

h3 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* Container media */
#mainMedia {
    width: 100%;
    max-width: 900px;
    height: 500px;              /* 🔥 stessa altezza del video */
    margin: 20px auto;
    overflow: hidden;
    border-radius: 12px;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    border:
    1px solid rgba(0,255,204,0.18);
    box-shadow:
        0 25px 60px rgba(0,0,0,0.55),
        0 0 40px rgba(0,255,204,0.08);
    position:relative;
}

#mainMedia::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:12px;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,0.35),
        transparent 40%
    );

    pointer-events:none;
}

/* video iframe */
#mainMedia iframe {
    width: 100%;
    height: 100%;
	transition: opacity 0.3s ease;
}

/* immagini */
#mainMedia img {
    width: 100%;
    height: 100%;
    object-fit: cover;	/* 🔥 riempie senza deformare */
	transition: opacity 0.3s ease;
}

#mainMedia iframe,
#mainMedia img{

    animation:
    mediaFade .35s ease;
}

@keyframes mediaFade{

    from{
        opacity:0;
        transform:scale(1.02);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

/* barra sotto stile Steam */
#mediaBar {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 10px auto 30px;
    max-width: 900px;
    overflow-x: auto;
    padding: 10px;
}

.thumb {
    width: 120px;
    height: 70px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0.6;
    transition: 0.2s;
    position:relative;

    overflow:hidden;

    border:
    1px solid rgba(255,255,255,0.05);

    box-shadow:
    0 6px 18px rgba(0,0,0,0.35);
}

.thumb:hover {
    opacity: 1;
    transform:
    scale(1.08)
    translateY(-3px);

    box-shadow:
        0 0 18px rgba(0,255,204,0.22);
}

.thumb.active {
    border: 2px solid #00ffcc;
    opacity: 1;
}

/* Descrizione */
#description {
    font-size: 15.5px;
    color: #cfcfcf;
    line-height: 1.75;
    letter-spacing: 0.2px;
}

/* Requisiti */
#requirements {
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;

    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(0,255,204,0.15);
    border-radius: 12px;

    backdrop-filter: blur(10px);
	transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
}

/* effetto hover principale */
#requirements:hover {
    transform: translateY(-3px);
    border-color: rgba(0, 255, 204, 0.35);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
}

/* effetto glow leggero interno */
#requirements:hover::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 12px;
    pointer-events: none;

    background: radial-gradient(
        circle at top,
        rgba(0, 255, 204, 0.08),
        transparent 60%
    );
    opacity: 1;
}

#requirements h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #00ffcc;
    font-size: 18px;
    text-transform: uppercase;
}

/* ===== DOWNLOAD BUTTON ===== */

#downloadBtn{

    position:relative;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    width:fit-content;

    min-width:240px;

    margin:35px auto 10px auto;

    padding:16px 34px;

    border-radius:18px;

    text-decoration:none;

    color:white;

    font-size:1rem;

    font-weight:800;

    letter-spacing:1px;

    background:
    linear-gradient(
        135deg,
        rgba(0,255,204,0.18),
        rgba(0,120,255,0.18)
    );

    border:
    1px solid rgba(0,255,204,0.24);

    backdrop-filter:blur(14px);

    -webkit-backdrop-filter:blur(14px);

    overflow:hidden;

    box-shadow:
        0 12px 30px rgba(0,0,0,0.45),
        0 0 28px rgba(0,255,204,0.14);

    transition:
        transform .25s ease,
        box-shadow .25s ease,
        border .25s ease;
}

/* glow */

#downloadBtn::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,0.18),
        transparent
    );

    opacity:0;

    transition:.3s ease;
}

/* shine */

#downloadBtn::after{

    content:"";

    position:absolute;

    top:0;
    left:-140%;

    width:60%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.28),
        transparent
    );

    transform:skewX(-22deg);

    transition:.7s ease;
}

#downloadBtn:hover::after{
    left:160%;
}

#downloadBtn:hover{

    transform:
    translateY(-3px)
    scale(1.02);

    border-color:
    rgba(0,255,204,0.35);

    box-shadow:
        0 0 24px rgba(0,255,204,0.18),
        0 18px 40px rgba(0,0,0,0.55);
}

#downloadBtn:hover::before{
    opacity:1;
}

/* Commenti */
#commentInput {
    flex: 1;
    min-width: 200px;
    padding: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: #1a1a2a;
    color: white;
}

.commentsBox {
    max-width: 900px;
    margin: 40px auto;
    text-align: center;
}

.commentsBox h2 {
    color: #00ffcc;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* form */
.commentFormTable {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px;
    border-top: none; /* 🔥 importante */
    background: rgba(0,0,0,0.2);
    flex-wrap: wrap;
}

.commentFormTable input[type="text"] {
    padding: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: #1a1a2a;
    color: white;

    flex: 1; /* 🔥 fondamentale */
    min-width: 150px;
}

.commentFormTable input[type="color"] {
    width: 34px;
    height: 34px;
    border: none;
    padding: 0;
    border-radius: 6px;
    cursor: pointer;
}

.commentFormTable input[type="color"]::-webkit-color-swatch-wrapper {
    padding: 0;
    border-radius: 6px;
}

.commentFormTable input[type="color"]::-webkit-color-swatch {
    border: 1px solid rgba(0,255,204,0.3);
    border-radius: 6px;
}

.commentFormTable .sendBtn {
    width: 90px;
    height: 38px;
    background: linear-gradient(90deg, #00ffcc, #0066ff);
    color: black;
    font-weight: bold;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

.commentFormTable .sendBtn:hover {
    transform: scale(1.05);
}

.commentDivider {
    height: 1px;
    margin: 10px 0;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(0,255,204,0.4),
        transparent
    );
}

/* lista commenti */
#comments {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* comment card */
.comment {
    background: rgba(255,255,255,0.05);
    padding: 12px;
    border-radius: 10px;
    text-align: left;

    border-left: 3px solid #00ffcc;
    transition: 0.2s;
}

.comment:hover {
    transform: translateX(5px);
    background: rgba(0,255,204,0.08);
}

#nicknameInput {
    width: 140px;
    padding: 9px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: #1a1a2a;
    color: white;
}

.commentsTable {

    width:100%;

    margin:20px auto;

    border-radius:14px;

    overflow:visible;

    background:
    rgba(255,255,255,0.03);

    border:
    1px solid rgba(255,255,255,0.06);

    backdrop-filter:blur(12px);

    -webkit-backdrop-filter:blur(12px);

    display:table;

    border-collapse:collapse;

    table-layout:fixed;
}

.commentsHeader {

    display:grid;

    grid-template-columns:
        200px
        1.7fr
        170px;

    text-align:center;

    background:
    rgba(0,255,204,0.08);

    color:#00ffcc;

    font-weight:700;

    font-size:12px;

    letter-spacing:1px;

    text-transform:uppercase;
}

.commentRow {

    display:grid;

    grid-template-columns:
        200px
        1.7fr
        170px;

    text-align:center;

    border-top:
    1px solid rgba(255,255,255,0.05);

    align-items:stretch;
}

.commentRow:hover{

    background:
    rgba(255,255,255,0.03);
}

/* celle */

.commentsHeader div,
.commentRow div{

    padding:12px;

    border-right:
    1px solid rgba(255,255,255,0.05);

    display:flex;

    align-items:center;

    justify-content:center;

    text-align:center;

    box-sizing:border-box;

    min-width:0;

    overflow:hidden;
}

/* rimuove ultimo bordo */

.commentsHeader div:last-child,
.commentRow div:last-child{

    border-right:none;
}

/* ===== COLUMN SIZES ===== */

.commentUser{

    text-align:center;

    font-weight:700;
}

.commentText{

    color:#ddd;

    line-height:1.4;

    white-space:pre-wrap;

    word-break:break-word;

    overflow-wrap:anywhere;
}

.commentDate{

    display:flex;

    align-items:center;

    justify-content:center;

    text-align:center;

    color:#8a8a8a;

    font-size:11px;

    white-space:nowrap;

    height:100%;
}

.commentHeader{

    display:flex;

    align-items:center;

    gap:10px;

    margin-bottom:8px;
}

.commentAvatar{

    width:38px;
    height:38px;

    border-radius:50%;

    object-fit:cover;

    border:
    2px solid rgba(0,255,204,0.3);
}

.commentFormTable{
    position:relative;
    overflow:visible;
}

.emojiWrapper{
    position:relative;
    overflow:visible;
}

button {
    display: block;
    margin: auto;
    padding: 10px 20px;
    background: #00ffcc;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
button:hover {
    background: #00ccaa;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
    position:relative;
    z-index:2;
}

.infoBox {
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    border: 1px solid rgba(0,255,204,0.2);
    backdrop-filter: blur(6px);
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
}

/* hover effetto identico ai requisiti */
.infoBox:hover {
    transform: translateY(-3px);
    border-color: rgba(0, 255, 204, 0.35);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
}

/* glow interno */
.infoBox:hover::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 12px;
    pointer-events: none;

    background: radial-gradient(
        circle at top,
        rgba(0, 255, 204, 0.08),
        transparent 60%
    );
    opacity: 1;
}

.infoBox h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #00ffcc;
    font-size: 18px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.infoBox p {
    color: #d1d1d1;
    line-height: 1.7;
}

.reqGrid {
    display: flex;
    gap: 30px;
}

/* ❗ NIENTE CARD SEPARATE */
.reqGrid > div {
    flex: 1;
    padding: 0;              /* importante */
    background: transparent; /* importantissimo */
    border: none;            /* importantissimo */
}

/* titoli colonne */
.reqGrid h3 {
    color: #00ffcc;
    font-size: 13px;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

/* testo uniforme */
.reqGrid p {
    color: #d0d0d0;
    font-size: 14px;
    line-height: 1.7;

    background: rgba(255,255,255,0.03);
    padding: 10px;
    border-radius: 8px;
}

.emojiWrapper {
    position: relative;
    display: inline-block;
}

.emojiBtn {
    width: 38px;
    height: 38px;
    border-radius: 6px;
    border: none;
    background: #1a1a2a;
    color: white;
    cursor: pointer;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 18px;
    line-height: 1;
    padding: 0;
}

/* PICKER sopra il bottone */
.emojiPicker {
    position: absolute;
    bottom: 45px;   /* 🔥 questo lo mette sopra */
    left: 50%;
    transform: translateX(-50%);

    display: none;
    flex-wrap: wrap;
    gap: 6px;

    padding: 10px;
    background: rgba(20,20,30,0.95);
    border: 1px solid rgba(0,255,204,0.3);
    border-radius: 10px;

    width: 220px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 9999;
}

.emojiPicker span {
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    transition: 0.2s;
}

.emojiPicker span:hover {
    transform: scale(1.3);
}

.mouse-glow{

    position:fixed;

    top:0;
    left:0;

    width:420px;
    height:420px;

    border-radius:50%;

    pointer-events:none;

    z-index:1;

    background:
    radial-gradient(
        circle,
        rgba(123,44,255,0.18) 0%,
        rgba(0,212,255,0.12) 40%,
        transparent 72%
    );

    filter:blur(60px);

    mix-blend-mode:screen;

    will-change:transform;

    contain:layout style paint;

    transform:translate3d(0,0,0);
}

#nicknameInput{

    pointer-events:none;

    user-select:none;

    opacity:0.85;

    cursor:default;
}

</style>

<body>

<div class="mouse-glow"></div>

<div class="bg-grid"></div>

<div class="container">

<h1 id="title"></h1>

<div id="mainMedia"></div>

<div id="mediaBar"></div>

<div class="infoBox">
    <h2>Informazioni sul gioco</h2>
    <p id="description"></p>
</div>

<div id="requirements">
    <h2>Requisiti di sistema</h2>

    <div class="reqGrid">
        <div>
            <h3>Minimi</h3>
            <p id="minReq"></p>
        </div>

        <div>
            <h3>Consigliati</h3>
            <p id="recReq"></p>
        </div>
    </div>
</div>

<a id="downloadBtn">Scarica</a>

<div class="commentsBox">

    <h2>COMMENTI</h2>

    <div class="commentsTable">

		<div class="commentsHeader">
			<div>Utente</div>
			<div>Commento</div>
			<div>Data</div>
		</div>

		<div id="comments"></div>
		
		<div class="commentDivider"></div>

		<!-- FORM DENTRO LA STESSA TABELLA -->
		<div class="commentFormTable">

            <input type="text" id="nicknameInput">
			<input type="color" id="colorPicker" value="#00ffcc">

			<input type="text" id="commentInput" placeholder="Scrivi un commento...">

			<div class="emojiWrapper">
				<button type="button" class="emojiBtn" onclick="toggleEmojiPicker()">🙂</button>

				<div id="emojiPicker" class="emojiPicker">
					<span onclick="addEmoji('😀')">😀</span>
					<span onclick="addEmoji('😂')">😂</span>
					<span onclick="addEmoji('😍')">😍</span>
					<span onclick="addEmoji('🔥')">🔥</span>
					<span onclick="addEmoji('💀')">💀</span>
					<span onclick="addEmoji('👍')">👍</span>
					<span onclick="addEmoji('😎')">😎</span>
					<span onclick="addEmoji('🎮')">🎮</span>
				</div>
			</div>
			
			<button class="sendBtn" onclick="sendComment()">Invia</button>

		</div>

	</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="games-data.js"></script>
<script src="auth.js"></script>
<script src="games.js"></script>

<script>

const glow = document.querySelector(".mouse-glow");

let mouseX = 0;
let mouseY = 0;

let currentX = 0;
let currentY = 0;

document.addEventListener("pointermove", e => {

    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animateGlow(){

    currentX += (mouseX - currentX) * 0.18;
    currentY += (mouseY - currentY) * 0.18;

    glow.style.transform =
    `translate3d(
        ${currentX - 210}px,
        ${currentY - 210}px,
        0
    )`;

    requestAnimationFrame(animateGlow);
}

animateGlow();


document.querySelectorAll(".infoBox").forEach(card => {

    card.addEventListener("mousemove", e => {

        const rect = card.getBoundingClientRect();

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const rotateY = (x / rect.width - 0.5) * 10;
        const rotateX = -(y / rect.height - 0.5) * 10;

        card.style.transform =
        `
        perspective(1000px)
        rotateX(${rotateX}deg)
        rotateY(${rotateY}deg)
        translateY(-4px)
        `;
    });

    card.addEventListener("mouseleave", () => {

        card.style.transform =
        `
        perspective(1000px)
        rotateX(0deg)
        rotateY(0deg)
        translateY(0px)
        `;
    });

});
</script>

</body>
</html>
