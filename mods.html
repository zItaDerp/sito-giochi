<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<title>Mods</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    radial-gradient(circle at top,#1f1147 0%,#0a0a0a 40%);

    color:white;

    font-family:'Inter',sans-serif;

    overflow-x:hidden;

    background-color:#0a0a0a;

    background-image:

    radial-gradient(
        rgba(255,255,255,0.08) 1px,
        transparent 1px
    );

    background-size:30px 30px;
}

body::selection{

    background:#7b2cff;
}

body::before{

    content:"";

    position:fixed;

    width:100%;

    height:100%;

    background:
    linear-gradient(
        45deg,
        transparent 48%,
        rgba(123,44,255,0.08) 50%,
        transparent 52%
    );

    background-size:400% 400%;

    pointer-events:none;
}

@keyframes gridMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(40px);
    }
}

.animated-bg{

    position:fixed;

    inset:0;

    z-index:-10;

    background:
    linear-gradient(
        -45deg,
        #0f0f1a,
        #0a0a12,
        #001a1a,
        #0f0f1a
    );

    background-size:400% 400%;

    animation:bgMove 12s ease infinite;
}

.vignette{

    position:fixed;

    inset:0;

    pointer-events:none;

    z-index:1;

    background:
    radial-gradient(
        circle at center,
        transparent 45%,
        rgba(0,0,0,.55)
    );
}

.particles{

    position:fixed;

    inset:0;

    overflow:hidden;

    pointer-events:none;

    z-index:0;
}

.particles::before,
.particles::after{

    content:"";

    position:absolute;

    width:600px;

    height:600px;

    background:
    radial-gradient(
        circle,
        rgba(123,44,255,0.18),
        transparent 70%
    );

    filter:blur(80px);

    animation:floatGlow 14s infinite alternate;
}

.particles::before{

    top:-150px;

    left:-150px;
}

.particles::after{

    bottom:-200px;

    right:-150px;

    animation-delay:4s;
}

@keyframes floatGlow{

    from{

        transform:
        translateY(0)
        translateX(0);
    }

    to{

        transform:
        translateY(60px)
        translateX(40px);
    }
}

body::after{

    content:"";

    position:fixed;

    inset:0;

    background-image:

    linear-gradient(
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    ),

    linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    );

    background-size:50px 50px;

    mask-image:
    radial-gradient(circle at center, black 30%, transparent 100%);

    pointer-events:none;

    z-index:0;
}

body::marker{
    display:none;
}

.mouse-glow{

    position:fixed;

    width:500px;
    height:500px;

    border-radius:50%;

    pointer-events:none;

    background:
    radial-gradient(
        circle,
        rgba(123,44,255,.16),
        transparent 70%
    );

    transform:
    translate(-50%,-50%);

    z-index:0;

    filter:blur(50px);
}

.container{

    max-width:1200px;

    margin:auto;

    padding:120px 20px 50px;

    position:relative;

    z-index:2;
}

.topbar{

    position:absolute;

    top:20px;

    left:20px;

    right:20px;

    height:80px;

    display:flex;

    align-items:center;

    padding:0 30px;

    border-radius:24px;

    background:
    rgba(10,10,20,.78);

    backdrop-filter:blur(20px);

    border:
    1px solid rgba(255,255,255,.08);

    box-shadow:
    0 10px 40px rgba(0,0,0,.35);

    z-index:999999;

    transform:none !important;

    will-change:auto;

    isolation:isolate;

    backface-visibility:hidden;
}

.topbar::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:inherit;

    padding:1px;

    background:
    linear-gradient(
        90deg,
        rgba(123,44,255,.6),
        rgba(0,212,255,.4)
    );

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    mask-composite:exclude;

    pointer-events:none;
}

.logo{

    color:white;

    text-decoration:none;

    font-size:1.3rem;

    font-weight:800;

    letter-spacing:1px;
}

.hero{

    display:flex;

    gap:40px;

    align-items:center;

    flex-wrap:wrap;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:30px;

    padding:25px;

    box-shadow:
    0 0 30px rgba(123,44,255,0.25);

    flex-direction:column;

    text-align:center;

    overflow:hidden;

    position:relative;
}

.hero img{

    width:100%;

    max-width:1000px;

    max-height:500px;

    object-fit:contain;

    border-radius:24px;

    margin-top:20px;

    margin-bottom:25px;

    box-shadow:
    0 0 40px rgba(123,44,255,0.45);

    transition:0.3s;
}

.hero::before{

    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:
    radial-gradient(
        circle,
        rgba(123,44,255,.35),
        transparent 70%
    );

    filter:blur(100px);

    z-index:-1;

    animation:heroGlow 8s infinite alternate;
}

@keyframes heroGlow{

    from{
        transform:translateX(-40px);
    }

    to{
        transform:translateX(40px);
    }
}

.hero img:hover{

    transform:scale(1.03);
}

.modpack-title{

    font-size:3.2rem;

    font-weight:900;

    margin-bottom:10px;

    background:
    linear-gradient(
        90deg,
        #ffffff,
        #a970ff,
        #00d4ff
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    text-align:center;

    text-shadow:
    0 0 25px rgba(123,44,255,0.35);
}

.info{

    flex:1;
}

.info h1{

    font-size:3rem;

    margin-bottom:15px;

    background:linear-gradient(90deg,#ffffff,#a970ff);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.info p{

    color:#d0d0d0;

    line-height:1.7;

    margin-bottom:20px;
}

.badges{

    display:flex;

    gap:12px;

    flex-wrap:wrap;

    margin-bottom:25px;

    justify-content:center;
}

.badge{

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.08);

    padding:10px 16px;

    border-radius:999px;

    font-size:0.95rem;

    backdrop-filter:blur(10px);
}

.download-btn{

    position:relative;

    overflow:hidden;

    display:inline-flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    padding:18px 34px;

    min-width:320px;

    border-radius:20px;

    text-decoration:none;

    color:white;

    font-weight:700;

    font-size:1rem;

    letter-spacing:.5px;

    background:
    linear-gradient(
        135deg,
        #7b2cff,
        #00d4ff
    );

    background-size:200% 200%;

    border:
    1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(12px);

    box-shadow:
    0 10px 35px rgba(123,44,255,.35);

    transition:
    transform .25s ease,
    box-shadow .25s ease;

    animation:
    gradientMove 6s ease infinite;

    z-index:1;
}

.download-btn span{

    position:relative;

    z-index:2;
}

.download-btn::before{

    content:"";

    position:absolute;

    top:0;

    left:-120%;

    width:60%;

    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.35),
        transparent
    );

    transform:skewX(-20deg);

    transition:.8s ease;

    z-index:1;
}

.download-btn:hover{

    transform:
    translateY(-4px)
    scale(1.03);

    box-shadow:
    0 18px 55px rgba(123,44,255,.5);
}

.download-btn:hover::before{

    left:160%;
}

.download-btn:active{

    transform:scale(.98);
}

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

.download-btn:hover{

    transform:
    translateY(-3px)
    scale(1.03);

    box-shadow:
    0 0 45px rgba(123,44,255,0.6);
}

.download-wrapper{

    display:flex;

    justify-content:center;

    align-items:center;

    margin-top:60px;

    margin-bottom:40px;
}

.section{

    margin-top:35px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:28px;

    padding:30px;

    backdrop-filter:blur(14px);

    box-shadow:
    0 0 25px rgba(0,0,0,0.25);

    text-align:left;

    align-items:flex-start;
}

.section h2{

    margin-bottom:20px;

    font-size:1.8rem;

    color:#c792ff;

    text-align:left;

    display:flex;

    align-items:center;

    gap:10px;
}

.section h2::after{

    content:"";

    flex:1;

    height:2px;

    background:
    linear-gradient(
        90deg,
        #7b2cff,
        transparent
    );
}

.features-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:20px;

    margin-top:25px;
}

.feature{

    position:relative;

    overflow:hidden;

    padding:22px;

    border-radius:24px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.06),
        rgba(255,255,255,0.02)
    );

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    transition:.35s;

    min-height:120px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 10px 30px rgba(0,0,0,.25);
}

.feature::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        130deg,
        transparent,
        rgba(123,44,255,0.12),
        transparent
    );

    opacity:0;

    transition:.4s;
}

.feature:hover{

    transform:
    translateY(-8px)
    scale(1.02);

    border-color:#8b5cf6;

    box-shadow:
    0 20px 60px rgba(139,92,246,.22);
}

.feature:hover::before{

    opacity:1;
}

.feature-icon{

    font-size:1.8rem;

    margin-bottom:14px;

    color:#a970ff;
}

.feature-text{

    color:#f1f1f1;

    line-height:1.6;

    font-size:1rem;
}

.step{

    background:rgba(255,255,255,0.04);

    border-left:4px solid #7b2cff;

    padding:18px;

    border-radius:16px;

    margin-top:18px;

    transition:0.2s;
}

.step:hover{

    transform:translateY(-2px);
}

.step strong{

    color:#b985ff;

    display:block;

    margin-bottom:8px;
}

@media(max-width:900px){

    .hero{

        flex-direction:column;
    }

    .hero img{

        width:100%;
    }

    .info h1{

        font-size:2.2rem;
    }
}

.modpack-title,
.logo,
.section h2{

    font-family:'Orbitron',sans-serif;
}

.section,
.feature{

    opacity:0;

    transform:
    translateY(40px);

    transition:
    opacity .7s ease,
    transform .7s ease;
}

.section.show,
.feature.show{

    opacity:1;

    transform:
    translateY(0);
}

</style>

</head>

<body>

<div class="particles"></div>

<header class="topbar">

    <a href="index.html" class="logo">
        🎮 LA CASA DEI GIOCHI - MODS 🎮
    </a>

</header>

<div class="container" id="container"></div>
<div class="mouse-glow"></div>
<div class="animated-bg"></div>
<div class="vignette"></div>

<script src="games-data.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const gameId = params.get("id");

const game = gamesData[gameId];
if(game){
    document.title = `${game.title} Mods`;
}

const container = document.getElementById("container");

if(!game || !game.mods || !game.mods.enabled){

    container.innerHTML = `
        <h1>Modpack non trovato</h1>
    `;

}else{

    const featuresHTML = `
        <div class="features-grid">

            ${(game.mods.features || []).map(feature => `

                <div class="feature">

                    <div class="feature-icon">
                        ✦
                    </div>

                    <div class="feature-text">
                        ${feature}
                    </div>

                </div>

            `).join("")}

        </div>
    `;

    const tutorialHTML = (game.mods.tutorial || []).map((step, index) => `
        <div class="step">
            <strong>STEP ${index + 1}</strong>
            <p>${step}</p>
        </div>
    `).join("");

    container.innerHTML = `

        <div class="hero">

            <h1 class="modpack-title">
                ${game.mods.modpackName || game.title + " Mods"}
            </h1>

            <img src="${game.mods.modsImage || game.image}">

            <div class="info">

                <p>${game.description}</p>

                <div class="badges">

                    <div class="badge">
                        🎮 ${game.mods.difficulty}
                    </div>

                    <div class="badge">
                        ${game.mods.multiplayer ? "✅ Multiplayer" : "❌ Singleplayer"}
                    </div>

                    <div class="badge">
                        ⚡ Moddato
                    </div>

                    <div class="badge">
                        📦 ${game.mods.version}
                    </div>

                    <div class="badge">
                        💾 ${game.mods.size}
                    </div>

                    <div class="badge">
                        🛠️ ${game.mods.updated}
                    </div>

                    <div class="badge">
                        👤 ${game.mods.creator}
                    </div>

                    <div class="badge">
                        🎯 ${game.mods.compatibility}
                    </div>

                </div>

            </div>
        
        </div>

        <div class="section">

            <h2>🔥 ${game.mods.whatIncludes}</h2>

            ${featuresHTML}

        </div>

        <div class="section">

            <h2>📖 Installazione</h2>

            ${tutorialHTML}

        </div>

        <div class="download-wrapper">

            <a class="download-btn"
                href="${game.mods.modpackDownload}"
                target="_blank">

                <span>⬇ Scarica Modpack</span>

            </a>

        </div>
    
    `;
}

const glow = document.querySelector(".mouse-glow");

document.addEventListener("mousemove", e => {

    glow.style.left = e.clientX + "px";

    glow.style.top = e.clientY + "px";
});

const observer = new IntersectionObserver(entries => {

    entries.forEach(entry => {

        if(entry.isIntersecting){

            entry.target.classList.add("show");
        }

    });

}, { threshold:0.15 });

document.querySelectorAll(".section,.feature")
.forEach(el => observer.observe(el));

</script>

</body>
</html>
