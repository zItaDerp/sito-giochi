<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mods</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    radial-gradient(circle at top,#1f1147 0%,#0a0a0a 40%);

    color:white;

    font-family:'Segoe UI',sans-serif;

    overflow-x:hidden;

    background-color:#0a0a0a;

    background-image:

    radial-gradient(
        rgba(255,255,255,0.08) 1px,
        transparent 1px
    );

    background-size:30px 30px;
}

body::selection{

    background:#7b2cff;
}

body::before{

    content:"";

    position:fixed;

    width:100%;

    height:100%;

    background:
    linear-gradient(
        45deg,
        transparent 48%,
        rgba(123,44,255,0.08) 50%,
        transparent 52%
    );

    background-size:40px 40px;

    animation:gridMove 12s linear infinite;

    pointer-events:none;
}

@keyframes gridMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(40px);
    }
}

.particles{

    position:fixed;

    inset:0;

    overflow:hidden;

    pointer-events:none;

    z-index:0;
}

.particles::before,
.particles::after{

    content:"";

    position:absolute;

    width:600px;

    height:600px;

    background:
    radial-gradient(
        circle,
        rgba(123,44,255,0.18),
        transparent 70%
    );

    filter:blur(80px);

    animation:floatGlow 14s infinite alternate;
}

.particles::before{

    top:-150px;

    left:-150px;
}

.particles::after{

    bottom:-200px;

    right:-150px;

    animation-delay:4s;
}

@keyframes floatGlow{

    from{

        transform:
        translateY(0)
        translateX(0);
    }

    to{

        transform:
        translateY(60px)
        translateX(40px);
    }
}

body::after{

    content:"";

    position:fixed;

    inset:0;

    background-image:

    linear-gradient(
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    ),

    linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    );

    background-size:50px 50px;

    mask-image:
    radial-gradient(circle at center, black 30%, transparent 100%);

    pointer-events:none;

    z-index:0;
}

.container{

    max-width:1200px;

    margin:auto;

    padding:50px 20px;

    position:relative;

    z-index:2;
}

.container::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    radial-gradient(
        circle at center,
        transparent 50%,
        rgba(0,0,0,0.55)
    );

    pointer-events:none;

    z-index:-1;
}

.topbar{

    width:100%;

    padding:20px 40px;

    border-bottom:
    1px solid rgba(255,255,255,0.06);

    backdrop-filter:blur(14px);

    position:sticky;

    top:0;

    z-index:100;
}

.logo{

    color:white;

    text-decoration:none;

    font-size:1.3rem;

    font-weight:800;

    letter-spacing:1px;
}

.hero{

    display:flex;

    gap:40px;

    align-items:center;

    flex-wrap:wrap;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:30px;

    padding:25px;

    box-shadow:
    0 0 30px rgba(123,44,255,0.25);

    flex-direction:column;

    text-align:center;

    overflow:hidden;
}

.hero img{

    width:100%;

    max-width:1000px;

    max-height:500px;

    object-fit:contain;

    border-radius:24px;

    margin-top:20px;

    margin-bottom:25px;

    box-shadow:
    0 0 40px rgba(123,44,255,0.45);

    transition:0.3s;
}

.hero img:hover{

    transform:scale(1.03);
}

.modpack-title{

    font-size:3.2rem;

    font-weight:900;

    margin-bottom:10px;

    background:
    linear-gradient(
        90deg,
        #ffffff,
        #a970ff,
        #00d4ff
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    text-align:center;

    text-shadow:
    0 0 25px rgba(123,44,255,0.35);
}

.info{

    flex:1;
}

.info h1{

    font-size:3rem;

    margin-bottom:15px;

    background:linear-gradient(90deg,#ffffff,#a970ff);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.info p{

    color:#d0d0d0;

    line-height:1.7;

    margin-bottom:20px;
}

.badges{

    display:flex;

    gap:12px;

    flex-wrap:wrap;

    margin-bottom:25px;

    justify-content:center;
}

.badge{

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.08);

    padding:10px 16px;

    border-radius:999px;

    font-size:0.95rem;

    backdrop-filter:blur(10px);
}

.download-btn{

    display:inline-flex;

    align-items:center;

    gap:10px;

    padding:16px 28px;

    border-radius:16px;

    background:
    linear-gradient(
        135deg,
        #7b2cff,
        #00d4ff
    );

    color:white;

    text-decoration:none;

    font-weight:bold;

    font-size:1rem;

    transition:0.25s;

    box-shadow:
    0 0 25px rgba(123,44,255,0.4);

    min-width:320px;

    max-width:420px;

    justify-content:center;

    text-align:center;
}

.download-btn:hover{

    transform:
    translateY(-3px)
    scale(1.03);

    box-shadow:
    0 0 45px rgba(123,44,255,0.6);
}

.download-wrapper{

    display:flex;

    justify-content:center;

    margin-top:60px;

    margin-bottom:40px;
}

.section{

    margin-top:35px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:28px;

    padding:30px;

    backdrop-filter:blur(14px);

    box-shadow:
    0 0 25px rgba(0,0,0,0.25);

    text-align:left;

    align-items:flex-start;
}

.section h2{

    margin-bottom:20px;

    font-size:1.8rem;

    color:#c792ff;

    text-align:left;

    display:flex;

    align-items:center;

    gap:10px;
}

.section h2::after{

    content:"";

    flex:1;

    height:2px;

    background:
    linear-gradient(
        90deg,
        #7b2cff,
        transparent
    );
}

.feature{

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.05);

    padding:16px;

    border-radius:16px;

    margin-top:14px;

    transition:0.2s;
}

.feature:hover{

    transform:translateX(6px);

    border-color:#7b2cff;
}

.step{

    background:rgba(255,255,255,0.04);

    border-left:4px solid #7b2cff;

    padding:18px;

    border-radius:16px;

    margin-top:18px;

    transition:0.2s;
}

.step:hover{

    transform:translateY(-2px);
}

.step strong{

    color:#b985ff;

    display:block;

    margin-bottom:8px;
}

@media(max-width:900px){

    .hero{

        flex-direction:column;
    }

    .hero img{

        width:100%;
    }

    .info h1{

        font-size:2.2rem;
    }
}

</style>

</head>

<body>

<div class="particles"></div>

<header class="topbar">

    <a href="index.html" class="logo">
        🎮 LA CASA DEI GIOCHI - MODS 🎮
    </a>

</header>

<div class="container" id="container"></div>

<script src="games-data.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const gameId = params.get("id");

const game = gamesData[gameId];
if(game){
    document.title = `${game.title} Mods`;
}

const container = document.getElementById("container");

if(!game || !game.mods || !game.mods.enabled){

    container.innerHTML = `
        <h1>Modpack non trovato</h1>
    `;

}else{

    const featuresHTML = (game.mods.features || []).map(feature => `
        <div class="feature">
            ✅ ${feature}
        </div>
    `).join("");

    const tutorialHTML = (game.mods.tutorial || []).map((step, index) => `
        <div class="step">
            <strong>STEP ${index + 1}</strong>
            <p>${step}</p>
        </div>
    `).join("");

    container.innerHTML = `

        <div class="hero">

            <h1 class="modpack-title">
                ${game.mods.modpackName || game.title + " Mods"}
            </h1>

            <img src="${game.mods.modsImage || game.image}">

            <div class="info">

                <p>${game.description}</p>

                <div class="badges">

                    <div class="badge">
                        🎮 ${game.mods.difficulty}
                    </div>

                    <div class="badge">
                        ${game.mods.multiplayer ? "✅ Multiplayer" : "❌ Singleplayer"}
                    </div>

                    <div class="badge">
                        ⚡ Moddato
                    </div>

                    <div class="badge">
                        📦 ${game.mods.version}
                    </div>

                    <div class="badge">
                        💾 ${game.mods.size}
                    </div>

                    <div class="badge">
                        🛠️ ${game.mods.updated}
                    </div>

                    <div class="badge">
                        👤 ${game.mods.creator}
                    </div>

                    <div class="badge">
                        🎯 ${game.mods.compatibility}
                    </div>

                </div>

            </div>
        
        </div>

        <div class="section">

            <h2>🔥 ${game.mods.whatIncludes}</h2>

            ${featuresHTML}

        </div>

        <div class="section">

            <h2>📖 Installazione</h2>

            ${tutorialHTML}

        </div>

        <div class="download-wrapper">

            <a class="download-btn"
                href="${game.mods.modpackDownload}"
                target="_blank">

                ⬇ Scarica Modpack

            </a>

        </div>
    
    `;
}

</script>

</body>
</html>
